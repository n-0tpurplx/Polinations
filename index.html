<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Polinations - Full Test Mock</title>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:#e2e8f0;
    margin:0;
}

.container {
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card {
    background:#1e293b;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}

input, textarea, select {
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:6px;
    border:none;
}

button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

button:hover { background:#0ea5e9; }

.post, .forum {
    background:#0f172a;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border-left:3px solid #38bdf8;
    cursor:pointer;
}

.hidden { display:none; }

.small { font-size:12px; color:#94a3b8; }

.flag {
    width:100px;
    height:60px;
    border-radius:6px;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>Polinations (Restored Test Build)</h1>

<!-- NATION CREATION -->
<div id="nationCreator" class="card">
    <h2>Create Nation</h2>

    <input id="nationName" placeholder="Nation Name">
    <input id="leaderName" placeholder="Leader Name">

    <select id="government">
        <option>Democracy</option>
        <option>Dictatorship</option>
        <option>Monarchy</option>
        <option>Republic</option>
        <option>Other</option>
    </select>

    <input id="ideology" placeholder="Ideology">
    <input id="flagColor" type="color" value="#ff0000">

    <button onclick="createNation()">Enter World</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">
    <h2 id="dName"></h2>

    <div id="flag" class="flag"></div>

    <p><b>Leader:</b> <span id="dLeader"></span></p>
    <p><b>Government:</b> <span id="dGov"></span></p>
    <p><b>Ideology:</b> <span id="dIdeology"></span></p>
</div>

<!-- GLOBAL FORUM -->
<div id="global" class="card hidden">
    <h2>🌍 Global Forum</h2>

    <textarea id="globalText" placeholder="Post to global world..."></textarea>
    <button onclick="postGlobal()">Post</button>

    <div id="globalPosts"></div>
</div>

<!-- CREATE FORUM -->
<div id="forumCreate" class="card hidden">
    <h2>Create Forum (Subreddit)</h2>

    <input id="forumName" placeholder="Forum name">
    <button onclick="createForum()">Create Forum</button>
</div>

<!-- FORUM LIST -->
<div id="forumList" class="card hidden">
    <h2>Forums</h2>
    <div id="forums"></div>
</div>

<!-- FORUM VIEW -->
<div id="forumView" class="card hidden">
    <h2 id="forumTitle"></h2>

    <textarea id="forumText" placeholder="Write post..."></textarea>
    <button onclick="postForum()">Post</button>

    <div id="forumPosts"></div>

    <button onclick="closeForum()">Back</button>
</div>

</div>

<script>

/* ---------------- NATION ---------------- */

let nation = null;

function createNation() {
    nation = {
        name: document.getElementById("nationName").value || "Unnamed Nation",
        leader: document.getElementById("leaderName").value || "Unknown",
        government: document.getElementById("government").value,
        ideology: document.getElementById("ideology").value || "Neutral",
        flagColor: document.getElementById("flagColor").value
    };

    sessionStorage.setItem("nation", JSON.stringify(nation));

    document.getElementById("nationCreator").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    document.getElementById("global").classList.remove("hidden");
    document.getElementById("forumCreate").classList.remove("hidden");
    document.getElementById("forumList").classList.remove("hidden");

    loadNation();
}

function loadNation() {
    document.getElementById("dName").innerText = nation.name;
    document.getElementById("dLeader").innerText = nation.leader;
    document.getElementById("dGov").innerText = nation.government;
    document.getElementById("dIdeology").innerText = nation.ideology;

    document.getElementById("flag").style.background = nation.flagColor;
}

/* ---------------- GLOBAL FORUM ---------------- */

let globalPosts = [];

function postGlobal() {
    const text = document.getElementById("globalText").value;
    if (!text) return;

    globalPosts.unshift({
        author: nation.name,
        content: text,
        time: new Date().toLocaleTimeString()
    });

    document.getElementById("globalText").value = "";
    renderGlobal();
}

function renderGlobal() {
    const el = document.getElementById("globalPosts");
    el.innerHTML = "";

    globalPosts.forEach(p => {
        el.innerHTML += `
            <div class="post">
                <b>${p.author}</b><br>
                ${p.content}<br>
                <small>${p.time}</small>
            </div>
        `;
    });
}

/* ---------------- FORUMS ---------------- */

let forums = [];
let currentForum = null;

function createForum() {
    const name = document.getElementById("forumName").value;
    if (!name) return;

    forums.unshift({
        id: crypto.randomUUID(),
        name,
        posts: []
    });

    document.getElementById("forumName").value = "";
    renderForums();
}

function renderForums() {
    const el = document.getElementById("forums");
    el.innerHTML = "";

    forums.forEach(f => {
        const div = document.createElement("div");
        div.className = "forum";
        div.innerHTML = `<b>${f.name}</b><br><span class="small">Subforum</span>`;
        div.onclick = () => openForum(f.id);
        el.appendChild(div);
    });
}

function openForum(id) {
    currentForum = forums.find(f => f.id === id);

    document.getElementById("forumView").classList.remove("hidden");
    document.getElementById("forumTitle").innerText = currentForum.name;

    renderForumPosts();
}

function postForum() {
    const text = document.getElementById("forumText").value;
    if (!text || !currentForum) return;

    currentForum.posts.unshift({
        author: nation.name,
        content: text,
        time: new Date().toLocaleTimeString()
    });

    document.getElementById("forumText").value = "";
    renderForumPosts();
}

function renderForumPosts() {
    const el = document.getElementById("forumPosts");
    el.innerHTML = "";

    currentForum.posts.forEach(p => {
        el.innerHTML += `
            <div class="post">
                <b>${p.author}</b><br>
                ${p.content}<br>
                <small>${p.time}</small>
            </div>
        `;
    });
}

function closeForum() {
    currentForum = null;
    document.getElementById("forumView").classList.add("hidden");
}

/* ---------------- INIT ---------------- */

window.onload = () => {
    let saved = sessionStorage.getItem("nation");

    if (saved) {
        nation = JSON.parse(saved);

        document.getElementById("nationCreator").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        document.getElementById("global").classList.remove("hidden");
        document.getElementById("forumCreate").classList.remove("hidden");
        document.getElementById("forumList").classList.remove("hidden");

        loadNation();
    }

    renderGlobal();
    renderForums();
};

</script>

</body>
</html>
