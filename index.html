<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Polinations Forums Mock</title>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:#e2e8f0;
    margin:0;
}

.container {
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card {
    background:#1e293b;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}

input, textarea {
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:6px;
    border:none;
}

button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

.post, .forum {
    background:#0f172a;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border-left:3px solid #38bdf8;
    cursor:pointer;
}

.hidden { display:none; }

.small { font-size:12px; color:#94a3b8; }
</style>
</head>

<body>

<div class="container">

<h1>Polinations Forum System</h1>

<!-- GLOBAL -->
<div class="card">
    <h2>🌍 Global Forum</h2>

    <textarea id="globalText" placeholder="Post to global..."></textarea>
    <button onclick="postGlobal()">Post</button>

    <div id="globalPosts"></div>
</div>

<!-- CREATE FORUM -->
<div class="card">
    <h2>Create Forum (Subreddit)</h2>
    <input id="forumName" placeholder="Forum name">
    <button onclick="createForum()">Create</button>
</div>

<!-- FORUM LIST -->
<div class="card">
    <h2>Forums</h2>
    <div id="forumList"></div>
</div>

<!-- FORUM VIEW -->
<div class="card hidden" id="forumView">
    <h2 id="forumTitle"></h2>

    <textarea id="forumText" placeholder="Post here..."></textarea>
    <button onclick="postForum()">Post</button>

    <div id="forumPosts"></div>

    <button onclick="closeForum()">Back</button>
</div>

</div>

<script>

let globalForum = {
    posts: []
};

let forums = [];
let currentForum = null;

/* GLOBAL */

function postGlobal() {
    const text = document.getElementById("globalText").value;
    if (!text) return;

    globalForum.posts.unshift({
        author: "Player",
        content: text,
        time: new Date().toLocaleTimeString()
    });

    document.getElementById("globalText").value = "";
    renderGlobal();
}

function renderGlobal() {
    const el = document.getElementById("globalPosts");
    el.innerHTML = "";

    globalForum.posts.forEach(p => {
        el.innerHTML += `
            <div class="post">
                <b>${p.author}</b><br>
                ${p.content}<br>
                <small>${p.time}</small>
            </div>
        `;
    });
}

/* FORUMS */

function createForum() {
    const name = document.getElementById("forumName").value;
    if (!name) return;

    forums.unshift({
        id: crypto.randomUUID(),
        name,
        posts: []
    });

    document.getElementById("forumName").value = "";
    renderForums();
}

function renderForums() {
    const el = document.getElementById("forumList");
    el.innerHTML = "";

    forums.forEach(f => {
        const div = document.createElement("div");
        div.className = "forum";
        div.innerHTML = `<b>${f.name}</b><br><span class="small">Custom forum</span>`;
        div.onclick = () => openForum(f.id);
        el.appendChild(div);
    });
}

function openForum(id) {
    currentForum = forums.find(f => f.id === id);

    document.getElementById("forumView").classList.remove("hidden");
    document.getElementById("forumTitle").innerText = currentForum.name;

    renderForumPosts();
}

function postForum() {
    const text = document.getElementById("forumText").value;
    if (!text || !currentForum) return;

    currentForum.posts.unshift({
        author: "Player",
        content: text,
        time: new Date().toLocaleTimeString()
    });

    document.getElementById("forumText").value = "";
    renderForumPosts();
}

function renderForumPosts() {
    const el = document.getElementById("forumPosts");
    el.innerHTML = "";

    currentForum.posts.forEach(p => {
        el.innerHTML += `
            <div class="post">
                <b>${p.author}</b><br>
                ${p.content}<br>
                <small>${p.time}</small>
            </div>
        `;
    });
}

function closeForum() {
    currentForum = null;
    document.getElementById("forumView").classList.add("hidden");
}

/* INIT */

renderGlobal();
renderForums();

</script>

</body>
</html>
